<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Diagram: signal diffusing through the market information hierarchy graph into quantile-regression forecasts">
  <rect width="640" height="400" fill="#171c15" />

  <g stroke="#96b481" stroke-width="1.5" opacity="0.55" marker-end="url(#arrow)">
    <line x1="90" y1="80" x2="90" y2="140" />
    <line x1="90" y1="180" x2="90" y2="240" />
    <line x1="90" y1="280" x2="90" y2="320" />
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#96b481" />
    </marker>
  </defs>

  <g fill="#96b481">
    <circle cx="90" cy="70" r="6" />
    <circle cx="90" cy="160" r="6" />
    <circle cx="90" cy="260" r="6" />
    <circle cx="90" cy="330" r="6" />
  </g>
  <g fill="#ece7d9" font-family="IBM Plex Mono, monospace" font-size="11">
    <text x="110" y="74">sec_corp</text>
    <text x="110" y="164">institutional</text>
    <text x="110" y="264">fin_press</text>
    <text x="110" y="334">informed / uninformed retail</text>
  </g>

  <g fill="#9a948a" font-family="IBM Plex Mono, monospace" font-size="11" text-anchor="middle">
    <text x="90" y="380">heat kernel on Lᵀ (graph Laplacian, transposed)</text>
  </g>

  <g stroke="#96b481" stroke-width="1.5" opacity="0.85">
    <line x1="270" y1="200" x2="380" y2="200" />
  </g>
  <path d="M375,195 L385,200 L375,205 Z" fill="#96b481" />

  <g fill="none" stroke="#ece7d9" stroke-width="1.5">
    <rect x="400" y="90" width="180" height="220" rx="4" />
  </g>
  <g fill="#ece7d9" font-family="IBM Plex Mono, monospace" font-size="12" text-anchor="middle">
    <text x="490" y="118">9 quantile models</text>
  </g>
  <g fill="#ece7d9" font-family="IBM Plex Mono, monospace" font-size="11" text-anchor="middle">
    <text x="490" y="160">P10</text>
    <text x="490" y="200">P50</text>
    <text x="490" y="240">P90</text>
    <text x="490" y="280">× 3 horizons</text>
  </g>
</svg>
