<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Diagram: shopping agent, preference-layer API, and user profile store">
  <rect width="640" height="400" fill="#171c15" />

  <g fill="none" stroke="#96b481" stroke-width="1.5">
    <rect x="60" y="160" width="150" height="80" rx="4" />
    <rect x="245" y="160" width="150" height="80" rx="4" />
    <rect x="430" y="160" width="150" height="80" rx="4" />
  </g>

  <g fill="#96b481" font-family="IBM Plex Mono, monospace" font-size="13" text-anchor="middle">
    <text x="135" y="195">shopping</text>
    <text x="135" y="212">agent</text>
    <text x="320" y="195">preference-layer</text>
    <text x="320" y="212">API</text>
    <text x="505" y="195">user profile</text>
    <text x="505" y="212">+ credentials</text>
  </g>

  <g stroke="#96b481" stroke-width="1.5" opacity="0.85">
    <line x1="210" y1="185" x2="245" y2="185" />
    <line x1="245" y1="215" x2="210" y2="215" />
    <line x1="395" y1="185" x2="430" y2="185" />
    <line x1="430" y1="215" x2="395" y2="215" />
  </g>
  <g fill="#96b481" font-family="IBM Plex Mono, monospace" font-size="10">
    <text x="212" y="180" text-anchor="middle">request</text>
    <text x="212" y="230" text-anchor="middle">profile-conditioned</text>
    <text x="397" y="180" text-anchor="middle">read</text>
    <text x="397" y="230" text-anchor="middle">write</text>
  </g>

  <text x="320" y="300" text-anchor="middle" fill="#9a948a" font-family="IBM Plex Mono, monospace" font-size="12" letter-spacing="1">USER-CONTROLLED PREFERENCE CREDENTIALS</text>
</svg>
